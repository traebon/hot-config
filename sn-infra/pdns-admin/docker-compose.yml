---
# ============================================================
# PowerDNS-Admin — Web GUI for PowerDNS
# Host: sn-infra (10.10.10.100)
# Stack: /opt/stacks/pdns-admin/
# Access: https://dns-admin.house-of-trae.com (via Caddy)
# ============================================================

services:

  pdns-admin:
    image: powerdnsadmin/pda-legacy:latest
    container_name: pdns-admin
    restart: unless-stopped
    depends_on:
      pdns-admin-db:
        condition: service_healthy
    ports:
      - "10.10.10.100:9191:8000"          # Caddy reverse proxies this — never expose externally
    environment:
      - SECRET_KEY_FILE=/run/secrets/pdns_admin_secret_key
      - SQLALCHEMY_DATABASE_URI_FILE=/run/secrets/pdns_admin_db_uri
      # PowerDNS API connection (Gateway VPS via WireGuard)
      - PDNS_STATS_URL=http://10.10.0.1:8081/
      - PDNS_API_KEY_FILE=/run/secrets/pdns_api_key
      - PDNS_VERSION=4.8
      # Session & security
      - BIND_ADDRESS=0.0.0.0
      # OIDC — Keycloak (optional, enable when ready)
      - OIDC_OAUTH_ENABLED=true
      - OIDC_OAUTH_KEY=pdns-admin
      - OIDC_OAUTH_SECRET_FILE=/run/secrets/pdns_admin_oidc_secret
      - OIDC_OAUTH_SCOPE=openid email profile
      - OIDC_OAUTH_API_URL=https://auth.house-of-trae.com/realms/securenexus
      - OIDC_OAUTH_TOKEN_URL=https://auth.house-of-trae.com/realms/securenexus/protocol/openid-connect/token
      - OIDC_OAUTH_AUTHORIZE_URL=https://auth.house-of-trae.com/realms/securenexus/protocol/openid-connect/auth
    healthcheck:
      test: ["CMD-SHELL", "wget --output-document=- --quiet --tries=1 http://127.0.0.1:8000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    secrets:
      - pdns_admin_secret_key
      - pdns_admin_db_uri
      - pdns_api_key
      - pdns_admin_oidc_secret
    networks:
      - pdns-admin-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  pdns-admin-db:
    image: postgres:16-alpine
    container_name: pdns-admin-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=pdnsadmin
      - POSTGRES_USER_FILE=/run/secrets/pdns_admin_db_user
      - POSTGRES_PASSWORD_FILE=/run/secrets/pdns_admin_db_password
    volumes:
      - pdns-admin-db-data:/var/lib/postgresql/data
    secrets:
      - pdns_admin_db_user
      - pdns_admin_db_password
    networks:
      - pdns-admin-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $(cat /run/secrets/pdns_admin_db_user) -d pdnsadmin"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pdns-admin-db-data:
    driver: local

networks:
  pdns-admin-net:
    driver: bridge

secrets:
  pdns_admin_secret_key:
    file: ./secrets/pdns_admin_secret_key
  pdns_admin_db_uri:
    file: ./secrets/pdns_admin_db_uri
  pdns_admin_db_user:
    file: ./secrets/pdns_admin_db_user
  pdns_admin_db_password:
    file: ./secrets/pdns_admin_db_password
  pdns_api_key:
    file: ./secrets/pdns_api_key
  pdns_admin_oidc_secret:
    file: ./secrets/pdns_admin_oidc_secret
