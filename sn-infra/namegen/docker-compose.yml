services:
  app:
    build: ./app
    container_name: namegen-app
    restart: unless-stopped
    environment:
      PORT: 8010
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: namegen
      DB_USER: namegen
      DB_PASSWORD_FILE: /run/secrets/db_password
      ANTHROPIC_API_KEY_FILE: /run/secrets/anthropic_api_key
      SESSION_SECRET_FILE: /run/secrets/session_secret
      OIDC_CLIENT_SECRET_FILE: /run/secrets/oidc_client_secret
      KEYCLOAK_URL: https://auth.house-of-trae.com
      KEYCLOAK_REALM: house-of-trae
      OIDC_CLIENT_ID: namegen
      BASE_URL: https://namevault.co.uk
      ADMIN_EMAILS: "tristian@securenexus.net,trae@house-of-trae.com"
      ADMIN_PATH: /mgmt-a7x92k
    secrets:
      - db_password
      - anthropic_api_key
      - session_secret
      - oidc_client_secret
    ports:
      - "10.10.10.100:8010:8010"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  db:
    image: postgres:16-alpine
    container_name: namegen-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: namegen
      POSTGRES_USER: namegen
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U namegen"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

secrets:
  db_password:
    file: ./secrets/db_password.txt
  anthropic_api_key:
    file: ./secrets/anthropic_api_key.txt
  session_secret:
    file: ./secrets/session_secret.txt
  oidc_client_secret:
    file: ./secrets/oidc_client_secret.txt

volumes:
  db_data:

networks:
  internal:
    driver: bridge
