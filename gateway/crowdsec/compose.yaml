services:

  crowdsec:
    image: crowdsecurity/crowdsec:latest
    container_name: crowdsec
    restart: unless-stopped
    environment:
      TZ: Europe/London
      COLLECTIONS: "crowdsecurity/caddy crowdsecurity/http-cve crowdsecurity/linux"
      GID: "1000"
    volumes:
      - crowdsec_data:/var/lib/crowdsec/data
      - crowdsec_config:/etc/crowdsec
      - /var/log:/var/log/host:ro
      - caddy_data:/var/log/caddy:ro
      - /opt/stacks/mailserver/logs:/var/log/mailserver:ro
    ports:
      - "100.106.41.10:8082:8080"
      - "10.10.0.1:6060:6060"
    networks:
      - hotinfra_edge

volumes:
  crowdsec_data:
    name: crowdsec_data
  crowdsec_config:
    name: crowdsec_config
  caddy_data:
    external: true

networks:
  hotinfra_edge:
    external: true
