web:
  port: 8080

storage:
  type: memory

metrics: true

connectivity:
  checker:
    target: 1.1.1.1:53
    interval: 60s

endpoints:
  - name: WireGuard Tunnel (bare metal)
    group: Infrastructure
    url: "icmp://10.10.0.2"
    interval: 1m
    conditions:
      - "[CONNECTED] == true"
    alerts:
      - type: custom
        failure-threshold: 2
        success-threshold: 1
        description: "Bare metal WireGuard tunnel is DOWN"

  - name: Keycloak SSO
    group: Gateway
    url: "https://auth.house-of-trae.com/realms/master/.well-known/openid-configuration"
    interval: 2m
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 5000"

  - name: Caddy / TLS
    group: Gateway
    url: "https://house-of-trae.com"
    interval: 2m
    conditions:
      - "[STATUS] == 200"
      - "[CERTIFICATE_EXPIRATION] > 168h"

  - name: Mailserver SMTP
    group: Gateway
    url: "tcp://151.241.217.91:25"
    interval: 2m
    conditions:
      - "[CONNECTED] == true"

  - name: Mailserver Submission
    group: Gateway
    url: "tcp://151.241.217.91:587"
    interval: 2m
    conditions:
      - "[CONNECTED] == true"

  - name: Ntfy
    group: Gateway
    url: "http://ntfy:80/v1/health"
    interval: 2m
    conditions:
      - "[STATUS] == 200"

  - name: Vaultwarden
    group: Gateway
    url: "http://vaultwarden:80/"
    interval: 2m
    conditions:
      - "[STATUS] == 200"

  - name: CrowdSec LAPI
    group: Gateway
    url: "http://crowdsec:8080/health"
    interval: 5m
    conditions:
      - "[STATUS] == 200"

  - name: ERPNext
    group: Services
    url: "https://erp.dickson-supplies.com"
    interval: 5m
    conditions:
      - "[STATUS] == 200"

  - name: Forgejo
    group: Services
    url: "https://git.securenexus.net"
    interval: 5m
    conditions:
      - "[STATUS] == 200"

  - name: Grafana
    group: Services
    url: "https://grafana.house-of-trae.com"
    interval: 5m
    conditions:
      - "[STATUS] == 200"

  - name: Wazuh SIEM
    group: Services
    url: "https://wazuh.house-of-trae.com"
    interval: 5m
    conditions:
      - "[STATUS] == 200"
