networks:
  hotinfra_edge:
    external: true
  keycloak_internal:
    driver: bridge

secrets:
  db_password:
    file: ./secrets/db_password
  admin_password:
    file: ./secrets/admin_password

services:
  keycloak-db:
    image: postgres:16-alpine
    container_name: keycloak-db
    restart: unless-stopped
    networks:
      - keycloak_internal
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    restart: unless-stopped
    networks:
      - hotinfra_edge
      - keycloak_internal
    depends_on:
      keycloak-db:
        condition: service_healthy
    entrypoint: ["/bin/bash", "/opt/custom/entrypoint.sh"]
    command: start
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_HOSTNAME: auth.house-of-trae.com
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_BOOTSTRAP_ADMIN_USERNAME: tristian
      KC_BOOTSTRAP_ADMIN_PASSWORD: placeholder
    secrets:
      - db_password
      - admin_password
    volumes:
      - ./entrypoint.sh:/opt/custom/entrypoint.sh:ro
    ports:
      - "8080:8080"

volumes:
  keycloak_db_data:
