services:
  tor:
    build: .
    image: hot/tor:local
    container_name: tor
    network_mode: host
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    volumes:
      - ./torrc:/etc/tor/torrc:ro
      - ./data:/var/lib/tor
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
