services:
  unbound:
    image: mvance/unbound:latest
    container_name: unbound
    restart: unless-stopped
    volumes:
      - ./unbound.conf:/opt/unbound/etc/unbound/unbound.conf:ro
    ports:
      - "127.0.0.1:5353:53/udp"   # Internal only — VPS use only
      - "127.0.0.1:5353:53/tcp"
    networks:
      - hotinfra_internal

networks:
  hotinfra_internal:
    external: true
